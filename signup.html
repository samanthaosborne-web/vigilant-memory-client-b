<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AdvisaStacks - Sign Up</title>
  <meta property="og:type" content="website" />
  <meta property="og:title" content="AdvisaStacks | Practical AI Toolkits for Tradie Consultants" />
  <meta property="og:description" content="We're looking for consultants to take part in beta testing for AdvisaStacks, a new AI App for tradie and small business support." />
  <meta property="og:image" content="https://advisastacks.com/AdvisaStacks%20Socials%20Feature.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="AdvisaStacks | Practical AI Toolkits for Tradie Consultants" />
  <meta name="twitter:description" content="We're looking for consultants to take part in beta testing for AdvisaStacks, a new AI App for tradie and small business support." />
  <meta name="twitter:image" content="https://advisastacks.com/AdvisaStacks%20Socials%20Feature.png" />
  <link rel="icon" type="image/png" href="./advisastacks-logo-favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #313131;
      --surface: #f9faff;
      --accent: #e75a00;
      --text-dark: #313131;
      --text-light: #f9faff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Roboto", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-light);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .auth-card {
      width: min(780px, 100%);
      background: var(--surface);
      color: var(--text-dark);
      border: 4px solid var(--accent);
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.28);
    }

    h1 {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: clamp(24px, 4vw, 34px);
    }

    .sub {
      margin: 0 0 20px;
      font-size: 14px;
      color: #4a4a4a;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label.field {
      display: grid;
      gap: 7px;
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      border: 2px solid var(--text-dark);
      border-radius: 10px;
      padding: 11px 12px;
      font: inherit;
      color: var(--text-dark);
      background: var(--surface);
    }

    .checkbox-group {
      margin-top: 2px;
      display: grid;
      gap: 12px;
      padding: 14px;
      border: 2px solid #d8d8d8;
      border-radius: 12px;
      background: #ffffff;
    }

    .check-item {
      display: grid;
      grid-template-columns: 20px 1fr;
      gap: 10px;
      align-items: start;
      font-size: 14px;
      line-height: 1.45;
      color: #2d2d2d;
    }

    .check-item input {
      margin-top: 2px;
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    a {
      color: var(--accent);
      font-weight: 700;
    }

    button {
      margin-top: 4px;
      justify-self: start;
      background: var(--accent);
      border: 2px solid var(--accent);
      border-radius: 10px;
      color: var(--text-light);
      padding: 10px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.24);
    }

    .status {
      min-height: 20px;
      font-size: 14px;
      font-weight: 600;
    }

    .status.error { color: #b30000; }
    .status.ok { color: #0f6e29; }
  </style>
</head>
<body>
  <main class="auth-card">
    <h1>Create your account</h1>
    <p class="sub">Sign up to access AdvisaStacks SaaS tools.</p>

    <form id="signupForm">
      <label class="field" for="email">
        Email
        <input id="email" name="email" type="email" autocomplete="email" required />
      </label>

      <label class="field" for="password">
        Password (minimum 8 characters)
        <input id="password" name="password" type="password" minlength="8" autocomplete="new-password" required />
      </label>

      <label class="field" for="confirmPassword">
        Confirm Password
        <input id="confirmPassword" name="confirmPassword" type="password" minlength="8" autocomplete="new-password" required />
      </label>

      <div class="checkbox-group">
        <label class="check-item" for="legalDisclaimer">
          <input id="legalDisclaimer" type="checkbox" required />
          <span>I agree to the <a href="./legal-disclaimer.html" target="_blank" rel="noopener">Legal Disclaimer</a>.</span>
        </label>

        <label class="check-item" for="privacyPolicy">
          <input id="privacyPolicy" type="checkbox" required />
          <span>I agree to the <a href="./privacy-policy.html" target="_blank" rel="noopener">Privacy Policy</a>.</span>
        </label>

        <label class="check-item" for="advisaDisclaimer">
          <input id="advisaDisclaimer" type="checkbox" required />
          <span>I understand AdvisaStack provides prompt tools only. AI responses are generated by third-party systems and must be reviewed before use. I am responsible for reviewing and approving any message before sending it to clients, staff, or suppliers. I understand AdvisaStack does not provide legal, financial, business, or employment advice.</span>
        </label>

        <label class="check-item" for="marketingConsent">
          <input id="marketingConsent" type="checkbox" />
          <span>Yes, I’d like to receive updates about new tools, products, and special offers.</span>
        </label>
      </div>

      <button type="submit">Create account</button>
      <div id="statusMessage" class="status" aria-live="polite"></div>
    </form>
    <p style="margin-top:14px; font-size:16px;">Already have an account? <a href="./login.html">Log in</a> | <a href="./home.html">Learn more</a></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./auth-config.js"></script>
  <script src="./signup.js"></script>
</body>
</html>
