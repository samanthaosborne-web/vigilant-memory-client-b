<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AdvisaStacks - Sign Up</title>
  <meta property="og:type" content="website" />
  <meta property="og:title" content="AdvisaStacks | Practical AI Toolkits for Tradie Consultants" />
  <meta property="og:description" content="We're looking for consultants to take part in beta testing for AdvisaStacks, a new AI App for tradie and small business support." />
  <meta property="og:image" content="https://advisastacks.com/AdvisaStacks%20Socials%20Feature.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="AdvisaStacks | Practical AI Toolkits for Tradie Consultants" />
  <meta name="twitter:description" content="We're looking for consultants to take part in beta testing for AdvisaStacks, a new AI App for tradie and small business support." />
  <meta name="twitter:image" content="https://advisastacks.com/AdvisaStacks%20Socials%20Feature.png" />
  <link rel="icon" type="image/png" href="./advisastacks-logo-favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #faf5ed;
      --surface: #faf5ed;
      --card-bg: #faf5ed;
      --accent: #c7612e;
      --accent-hover: #b35425;
      --text-dark: #292727;
      --text-muted: #292727;
      --text-light: #292727;
      --border-subtle: #a89b8b;
      --radius-sm: 6px;
      --radius-md: 10px;
      --shadow-md: 0 4px 12px rgba(45, 42, 38, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Roboto", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .auth-card {
      width: min(560px, 100%);
      background: var(--surface);
      color: var(--text-dark);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 28px;
      box-shadow: var(--shadow-md);
    }

    h1 {
      margin: 0 0 6px;
      color: var(--text-dark);
      font-size: clamp(22px, 4vw, 28px);
    }

    .sub {
      margin: 0 0 18px;
      font-size: 13px;
      color: var(--text-muted);
    }

    form {
      display: grid;
      gap: 12px;
    }

    label.field {
      display: grid;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font: inherit;
      font-size: 16px;
      color: var(--text-dark);
      background: var(--surface);
    }

    input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    .checkbox-group {
      margin-top: 4px;
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      background: var(--card-bg);
    }

    .check-item {
      display: grid;
      grid-template-columns: 20px 1fr;
      gap: 8px;
      align-items: start;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-dark);
    }

    .check-item input {
      margin-top: 2px;
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    a {
      color: var(--accent);
      font-weight: 600;
    }

    button {
      margin-top: 4px;
      justify-self: start;
      background: var(--accent);
      border: 1px solid var(--accent);
      border-radius: var(--radius-sm);
      color: #241f72;
      padding: 10px 18px;
      font: inherit;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(45, 42, 38, 0.06);
      transition: background 0.15s;
    }

    button:hover {
      background: var(--accent-hover);
    }

    .status {
      min-height: 18px;
      font-size: 13px;
      font-weight: 600;
    }

    .status.error { color: #b30000; }
    .status.ok { color: #0f6e29; }
  </style>
</head>
<body>
  <main class="auth-card">
    <img src="./advisastacks-logo.png" alt="AdvisaStacks" style="width:180px; height:auto; margin-bottom:16px;" />
    <h1 id="signupHeading">Create your account</h1>
    <p class="sub" id="signupSub">Sign up to access AdvisaStacks SaaS tools.</p>
    <input type="hidden" id="accountType" value="client" />

    <form id="signupForm">
      <label class="field" for="firstName">
        First Name
        <input id="firstName" name="firstName" type="text" autocomplete="given-name" required />
      </label>

      <label class="field" for="email">
        Email
        <input id="email" name="email" type="email" autocomplete="email" required />
      </label>

      <label class="field" for="password">
        Password (minimum 8 characters)
        <input id="password" name="password" type="password" minlength="8" autocomplete="new-password" required />
      </label>

      <label class="field" for="confirmPassword">
        Confirm Password
        <input id="confirmPassword" name="confirmPassword" type="password" minlength="8" autocomplete="new-password" required />
      </label>

      <div class="checkbox-group">
        <label class="check-item" for="legalDisclaimer">
          <input id="legalDisclaimer" type="checkbox" required />
          <span>I agree to the <a href="./legal-disclaimer.html" target="_blank" rel="noopener">Legal Disclaimer</a>.</span>
        </label>

        <label class="check-item" for="privacyPolicy">
          <input id="privacyPolicy" type="checkbox" required />
          <span>I agree to the <a href="./privacy-policy.html" target="_blank" rel="noopener">Privacy Policy</a>.</span>
        </label>

        <label class="check-item" for="advisaDisclaimer">
          <input id="advisaDisclaimer" type="checkbox" required />
          <span>I understand AdvisaStack provides prompt tools only. AI responses are generated by third-party systems and must be reviewed before use. I am responsible for reviewing and approving any message before sending it to clients, staff, or suppliers. I understand AdvisaStack does not provide legal, financial, business, or employment advice.</span>
        </label>

        <label class="check-item" for="marketingConsent">
          <input id="marketingConsent" type="checkbox" />
          <span>Yes, I’d like to receive updates about new tools, products, and special offers.</span>
        </label>
      </div>

      <button type="submit">Create account</button>
      <div id="statusMessage" class="status" aria-live="polite"></div>
    </form>
    <p style="margin-top:14px; font-size:16px;" id="signupLinks">Already have an account? <a href="./login.html">Log in</a> | <a href="./home.html">Learn more</a></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./auth-config.js"></script>
  <script src="./signup.js"></script>
</body>
</html>
