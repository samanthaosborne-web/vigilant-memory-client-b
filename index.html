  <body>
  <!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Business Toolkit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #eeeff1;
      --text: #000000;
      --accent: #005792;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Poppins", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .site-header {
      position: relative;
      z-index: 10000;
      background: #1d2958;
      border-bottom: 1px solid rgba(0, 0, 0, 0.15);
      line-height: 0;
      padding-top: env(safe-area-inset-top);
    }

    .header-hero-img {
      display: block;
      width: 100%;
      height: auto;
    }

    .menu-btn {
      position: absolute;
      right: calc(18px + env(safe-area-inset-right));
      top: calc(18px + env(safe-area-inset-top));
      border: 2px solid #efde21;
      background: rgba(18, 33, 83, 0.88);
      padding: 14px;
      cursor: pointer;
      min-width: 64px;
      min-height: 64px;
      z-index: 10030;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .menu-btn:focus {
      outline: 3px solid rgba(29, 41, 88, 0.25);
      outline-offset: 2px;
    }

    .menu-icon {
      width: 34px;
      height: 24px;
      display: inline-flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .menu-icon span {
      display: block;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: #efde21;
    }

    .menu-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: min(320px, 92vw);
      height: 100vh;
      background: #ffffff;
      transform: translateX(110%);
      transition: transform 180ms ease;
      z-index: 10020;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: -18px 0 40px rgba(0, 0, 0, 0.18);
      overflow-y: auto;
    }

    .menu-panel.open {
      transform: translateX(0);
    }

    .menu-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
      z-index: 10010;
    }

    .menu-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .nav-categories {
      font-size: 34px;
      font-weight: 700;
      color: #1d2958;
      text-align: center;
      margin: 6px 0 18px 0;
    }

    .menu-item {
      background: transparent;
      border: none;
      border-radius: 0;
      color: #1d2958;
      font-size: 22px;
      font-weight: 600;
      padding: 12px 10px;
      text-align: center;
      cursor: pointer;
      width: 100%;
      font-family: "Poppins", sans-serif;
    }

    .menu-item.active {
      background: #1d2958;
      color: #efde21;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 18px;
    }

    .page-title {
      margin: 8px 0 6px;
      font-size: 22px;
      font-weight: 900;
    }

    .page-help {
      margin: 0 0 20px;
      max-width: 860px;
      font-size: 14px;
      line-height: 1.6;
    }

    /* Global Inputs */
    .global-inputs {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
      padding: 16px;
      background: #1d2958;
      border-radius: 12px;
    }

    .global-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 200px;
    }

    .global-field label {
      font-size: 13px;
      font-weight: 600;
      color: #efde21;
    }

    .global-field input {
      padding: 10px;
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: 14px;
      color: #1d2958;
    }

    .global-field input:focus {
      outline: 3px solid #efde21;
      outline-offset: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
      align-items: start;
    }

    .card {
      grid-column: span 12;
      border: 4px solid #1d2958;
      border-radius: 18px;
      overflow: hidden;
      background: #1d2958;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 24px rgba(12, 18, 44, 0.22);
      transition: box-shadow 0.2s ease;
    }

    @media (min-width: 860px) {
      .card {
        grid-column: span 6;
      }
    }

    .card.open {
      background: #ffffff;
      box-shadow: 0 14px 30px rgba(12, 18, 44, 0.28);
    }

    .card-head {
      padding: 16px;
      cursor: pointer;
      background: #1d2958;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      height: auto;
      flex: 0 0 auto;
    }

    .card-head h3 {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
    }

    .kv {
      display: grid;
      gap: 8px;
      font-size: 14px;
      line-height: 1.35;
      color: #ffffff;
    }

    .kv .row {
      display: flex;
      gap: 8px;
    }

    .kv .label {
      min-width: 118px;
      font-weight: 400;
      color: #efde21;
    }

    .reveal-btn {
      margin-top: 14px;
      width: 100%;
      background: #efde21;
      color: #1d2958;
      border: 2px solid #efde21;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .reveal-btn:hover {
      filter: brightness(0.95);
    }

    .reveal-btn:focus {
      outline: 3px solid rgba(239, 222, 33, 0.35);
      outline-offset: 2px;
    }

    .card-body {
      display: none;
      background: #ffffff;
      color: #1d2958;
      padding: 14px 16px 16px;
      flex: 0 0 auto;
      border: none;
      outline: none;
    }

    .card.open .card-body {
      display: block;
    }

    .ui-block {
      margin: 0 0 16px 0;
    }

    .ui-row {
      margin: 10px 0;
    }

    .ui-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
      opacity: 0.9;
    }

    .chips,
    .fields {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .chip-label {
      cursor: pointer;
      user-select: none;
    }

    .chip-label input[type="radio"] {
      display: none;
    }

    .chip-label span {
      display: inline-flex;
      padding: 8px 10px;
      border: 2px solid #1d2958;
      background: #ffffff;
      color: #1d2958;
      font-size: 13px;
      line-height: 1.1;
      transition: all 0.2s ease;
    }

    .chip-label input[type="radio"]:checked+span {
      background: #1d2958;
      color: #efde21;
    }

    .type-input,
    .custom-input {
      padding: 8px 10px;
      border: 2px solid #1d2958;
      background: #ffffff;
      color: #1d2958;
      font-size: 13px;
      line-height: 1.3;
      font-family: inherit;
      outline: none;
      min-width: 140px;
      resize: vertical;
      display: inline-flex;
    }

    .custom-input {
      display: none;
    }

    .custom-input.active {
      display: inline-block;
    }

    .type-input:focus,
    .custom-input:focus {
      outline: 3px solid rgba(29, 41, 88, 0.25);
      outline-offset: 2px;
    }

    .prompt-block {
      padding: 12px;
      margin: 10px 0;
    }

    .prompt-label {
      font-size: 13px;
      font-weight: 400;
      margin: 0 0 8px;
      color: #1d2958;
    }

    .prompt-text {
      white-space: pre-wrap;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.45;
      margin: 0 0 10px;
      font-weight: 400;
      color: #1d2958;
    }

    .copy-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 12px;
    }

    .copy-btn {
      background: #efde21;
      color: #1d2958;
      border: 2px solid #efde21;
      padding: 8px 14px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.15s ease;
      border-radius: 0;
    }

    .copy-btn:hover {
      filter: brightness(0.95);
    }

    .copy-btn:active {
      transform: translateY(1px);
    }

    .chatbot-badge a {
      color: #1d2958;
      text-decoration: none;
      border-bottom: 1px solid #1d2958;
      padding-bottom: 1px;
      font-size: 14px;
    }

    .chatbot-badge a:hover {
      opacity: 0.7;
    }

    .help-block {
      margin-top: 8px;
    }

    .help-head {
      font-weight: 700;
      margin-top: 14px;
    }

    .help-head:first-child {
      margin-top: 0;
    }

    .help-text {
      font-weight: 400;
      margin: 6px 0 0;
    }

    footer {
      border-top: 1px solid rgba(0, 0, 0, 0.12);
      padding: 16px 18px;
    }

    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
      font-size: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px 22px;
    }

    .footer-inner a {
      color: inherit;
    }

    .made-by {
      margin-left: auto;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      font-weight: 600;
      text-align: right;
    }

    .made-by-logo {
      width: 164px;
      height: auto;
      display: block;
    }

    body::before {
      content: "SAMPLE";
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: min(18vw, 220px);
      font-weight: 800;
      letter-spacing: 0.08em;
      color: #000000;
      opacity: 0.12;
      transform: rotate(-20deg);
      z-index: 9999;
      pointer-events: none;
      user-select: none;
    }

    @media (max-width: 640px) {
      .header-hero-img {
        height: 220px;
        object-fit: cover;
        object-position: center center;
      }

      .menu-btn {
        right: calc(10px + env(safe-area-inset-right));
        top: calc(10px + env(safe-area-inset-top));
        min-width: 50px;
        min-height: 50px;
        padding: 9px;
      }

      .menu-icon {
        width: 28px;
        height: 20px;
      }

      .menu-icon span {
        height: 3px;
      }

      .menu-panel {
        width: min(320px, 94vw);
        padding: calc(12px + env(safe-area-inset-top)) 14px calc(16px + env(safe-area-inset-bottom));
        gap: 8px;
      }

      .nav-categories {
        font-size: 28px;
        margin: 2px 0 10px;
      }

      .menu-item {
        font-size: 20px;
        padding: 10px 8px;
      }

      .made-by {
        width: 100%;
        margin-left: 0;
        justify-content: flex-end;
      }
    }

    @media (max-width: 420px) {
      .header-hero-img {
        height: 200px;
      }
    }
  </style>
</head>

<body>
  <div class="menu-overlay" id="menuOverlay" aria-hidden="true"></div>

  <header class="site-header">
    <img class="header-hero-img" src="./header-exact.png" alt="Profitable Tradie Business Toolkit" />
    <button class="menu-btn" id="menuBtn" aria-label="Open menu" aria-expanded="false">
      <span class="menu-icon" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>
  </header>

  <div class="menu-backdrop" id="menuBackdrop"></div>
  <nav class="menu-panel" id="menuPanel" aria-label="Categories">
    <h2 class="nav-categories">Categories</h2>
    <button class="menu-item active" data-key="Winning Work">Winning Work</button>
    <button class="menu-item" data-key="Getting Paid">Getting Paid</button>
    <button class="menu-item" data-key="Job Updates">Job Updates</button>
    <button class="menu-item" data-key="Reviews & Referrals">Reviews & Referrals</button>
    <button class="menu-item" data-key="Get More Enquiries">Get More Enquiries</button>
    <button class="menu-item" data-key="Fix My Message">Fix My Message</button>
  </nav>

  <main>
    <div class="page-title" id="pageTitle"></div>
    <div class="page-help" id="pageHelp"></div>

    <div class="global-inputs">
      <div class="global-field">
        <label>Your First Name</label>
        <input type="text" id="globalFirstName" placeholder="e.g. John" />
      </div>
      <div class="global-field">
        <label>Business Name</label>
        <input type="text" id="globalBizName" placeholder="e.g. Smith Plumbing" />
      </div>
    </div>

    <div class="grid" id="cardGrid"></div>
  </main>

  <footer>
  <div class="footer-inner">
  <div>W: <a href="https://profitabletradie.com/" target="_blank" rel="noreferrer">https://profitabletradie.com/</a></div>
  <div>P: +64 7 859 3425</div>
  <div>E: <a href="mailto:info@profitabletradie.com">info@profitabletradie.com</a></div>
  <div class="made-by">
    <img src="./advisastacks-logo.png.png" alt="AdvisaStacks logo" class="made-by-logo" />
    <span>Made by AdvisaStacks</span>
  </div>
</div>
  </footer>

  <script>
    const APP = {
      "Winning Work": {
        "title": "Winning Work",
        "cards": [{
            "subtitle": "Quote Follow-Up (24 hours)",
            "chatbot": "ChatGPT",
            "front": {
              "outcome": "Nudge the client to approve the quote without sounding pushy.",
              "when": "24–48 hours after sending a quote.",
              "goodFor": "Getting a clear yes or next step without chasing.",
              "roi": "More quotes accepted, fewer jobs going cold.",
              "tip": "Keep it short. Ask one clear question."
            },
            "ui": {
              "quickInputs": [{
                  "label": "Channel",
                  "options": ["SMS", "Email"]
                },
                {
                  "label": "Tone",
                  "options": ["Friendly", "Direct"]
                },
                {
                  "label": "Next step",
                  "options": ["Approve the quote", "Book a site visit", "Choose a start date"]
                }
              ],
              "fields": ["[Client name]", "[Job type]", "[Quote sent date]", "[Next step link or instruction]"]
            },
            "prompts": ["Write a [Channel] to [Client name] following up a quote sent [Quote sent date] for [Job type].\n\nTone: [Tone].\nGoal: get them to take the next step: [Next step].\nInclude:\n- 1 polite line checking they received it\n- 1 line summarising the job in plain English\n- 1 clear question as the call to action\n- optional: 1 sentence about next availability if helpful\n\nAdd this at the end: [Next step link or instruction].\nReturn 2 versions."]
          },
          {
            "subtitle": "Quote Follow-Up (3–5 days)",
            "chatbot": "ChatGPT",
            "front": {
              "outcome": "Bring the job back to the top of their mind and close the loop.",
              "when": "3–5 days after quote, or when they have gone quiet.",
              "goodFor": "Getting a yes or no, and freeing up your diary if it is a no.",
              "roi": "Fewer dead quotes, steadier pipeline.",
              "tip": "Give an easy out, hold a spot or close it off."
            },
            "ui": {
              "quickInputs": [{
                  "label": "Channel",
                  "options": ["SMS", "Email"]
                },
                {
                  "label": "Tone",
                  "options": ["Friendly", "Firm"]
                },
                {
                  "label": "Urgency",
                  "options": ["None", "We are booking up", "Quote valid until (date)"]
                },
                {
                  "label": "Offer",
                  "options": ["Call me", "Text OK to proceed", "Pick a date"]
                }
              ],
              "fields": ["[Client name]", "[Job type]", "[Availability window]"]
            },
            "prompts": ["Write a short [Channel] to [Client name].\n\nContext: I sent a quote for [Job type] about 3–5 days ago and have not heard back.\nTone: [Tone]. No AI language.\n\nGoal: prompt a decision (yes/no) and make it easy.\nInclude:\n- friendly check in\n- simple reminder of what the quote covers\n- one clear question: proceed, adjust scope, or close it off?\nOptional urgency: [Urgency].\nMake the next step: [Offer].\nOptional availability: [Availability window].\n\nReturn 2 versions."]
          },
          {
            "subtitle": "Handling “Can you do it cheaper?”",
            "chatbot": "ChatGPT",
            "front": {
              "outcome": "Hold your price without being awkward, and keep the job alive.",
              "when": "Client asks for a discount or tries to negotiate.",
              "goodFor": "Protecting margin while offering sensible options.",
              "roi": "Better margins, fewer problem jobs.",
              "tip": "Do not discount first. Offer scope options (Good / Better / Best)."
            },
            "ui": {
              "quickInputs": [{
                  "label": "Channel",
                  "options": ["SMS", "Email"]
                },
                {
                  "label": "Approach",
                  "options": ["Hold price", "Offer options", "Offer small concession"]
                }
              ],
              "fields": ["[Client name]", "[Job type]", "[Quote amount]", "[What’s included]", "[What can be adjusted]"]
            },
            "prompts": ["Write a reply for [Channel] to [Client name] about [Job type]. Quote amount: [Quote amount].\nWhat the quote includes: [What’s included].\n\nThe client said: \"Can you do it cheaper?\"\nKeep it calm, confident, and practical. No AI language.\n\nGoal:\n- acknowledge the question\n- explain briefly what drives the price (time, materials, warranty, quality)\n- avoid sounding defensive\n- give a clear path forward using one of these approaches: [Approach]\n\nIf using options, give:\n- Option A (same scope, same price)\n- Option B (reduced scope or alternative material) with a lower price range\n- Option C (premium or add on) if relevant\n\nEnd with one clear question: \"Which option do you want to go with?\" or \"Want me to adjust the scope to fit your budget?\"\nReturn 2 variations."]
          },
          {
            "subtitle": "Turn an enquiry into a booked site visit",
            "chatbot": "ChatGPT",
            "front": {
              "outcome": "Convert a “How much?” enquiry into a booked time.",
              "when": "New lead asks for price or availability.",
              "goodFor": "Qualifying quickly and booking the next step.",
              "roi": "More booked visits, faster quoting, higher close rate.",
              "tip": "Ask 2–3 qualifying questions, then offer 2 time options."
            },
            "ui": {
              "quickInputs": [{
                  "label": "Channel",
                  "options": ["SMS", "Email"]
                },
                {
                  "label": "Lead source",
                  "options": ["Facebook", "Google", "Referral", "Website form"]
                },
                {
                  "label": "Booking style",
                  "options": ["Offer 2 times", "Ask for best time"]
                }
              ],
              "fields": ["[Client name]", "[Job type]", "[Suburb]", "[Two time options]", "[What you need to know]"]
            },
            "prompts": ["Write a [Channel] reply to a new enquiry.\n\nLead source: [Lead source].\nThey asked: \"[paste their message]\"\n\nGoal: book a site visit (or call) to quote properly.\nDetails:\n- Job type: [Job type]\n- Suburb: [Suburb]\n- Offer these time options: [Booking style] -> [Two time options]\n- I need these details before arriving: [What you need to know] (max 3 questions)\n\nRules:\n- sound professional and friendly\n- no fluff\n- ask 2–3 short questions\n- offer the two time slots\n- include what to expect (for example, “I will confirm price after a quick look”)\n\nReturn 2 versions."]
          },
          {
            "subtitle": "Explain why your quote costs more",
            "chatbot": "ChatGPT",
            "front": {
              "outcome": "Justify your price and reduce “shopping around” objections.",
              "when": "Client says you are more expensive than others.",
              "goodFor": "Keeping the job alive without racing to the bottom.",
              "roi": "Higher close rate at your price point.",
              "tip": "Focus on risk and outcomes, not hype."
            },
            "ui": {
              "quickInputs": [{
                  "label": "Channel",
                  "options": ["SMS", "Email"]
                },
                {
                  "label": "Emphasis",
                  "options": ["Quality", "Warranty", "Compliance", "Speed", "Clean finish"]
                }
              ],
              "fields": ["[Client name]", "[Job type]", "[Key differentiators]", "[One risk you reduce]"]
            },
            "prompts": ["Write a [Channel] to [Client name] about [Job type]. Natural, confident, no AI language.\n\nClient says: \"Your quote is higher than the others.\"\n\nMy key differentiators: [Emphasis] (for example, warranty, licensed work, quality materials, clean finish, reliable timeframe).\nRisk I reduce: [One risk you reduce] (for example, rework, non compliance, delays).\n\nGoal: explain value in plain English and keep the door open.\nStructure:\n- acknowledge\n- 2–3 bullets or short sentences explaining what is included and why it matters\n- invite them to compare like for like (scope, materials, warranty)\n- end with a simple question: proceed, adjust scope, or jump on a quick call\n\nReturn 2 versions."]
          },
          {
            "subtitle": "Upsell extra work during quoting (Good / Better / Best)",
            "chatbot": "ChatGPT",
            "front": {
              "outcome": "Increase job value without being salesy.",
              "when": "While quoting or on site, when add ons make sense.",
              "goodFor": "Presenting upgrades clearly so clients choose more value.",
              "roi": "Higher average job value and better margins.",
              "tip": "Position upgrades as options, not pressure."
            },
            "ui": {
              "quickInputs": [{
                  "label": "Channel",
                  "options": ["SMS", "Email"]
                },
                {
                  "label": "Tone",
                  "options": ["Helpful", "Direct"]
                },
                {
                  "label": "Format",
                  "options": ["Good-Better-Best", "Add on list"]
                }
              ],
              "fields": ["[Client name]", "[Job type]", "[Base scope]", "[Option 1] — [Price range]", "[Option 2] — [Price range]", "[Option 3] — [Price range]"]
            },
            "prompts": ["Write a [Channel] to [Client name] presenting quote options for [Job type].\nKeep it helpful and practical. No AI language.\n\nTone: [Tone].\nFormat: [Format].\n\nBase scope: [Base scope]\nAdd on or upgrade options:\n1) [Option 1] — [Price range]\n2) [Option 2] — [Price range]\n3) [Option 3] — [Price range]\n\nGoal: make it easy to choose.\nRules:\n- present as choices, not pressure\n- explain each option in one simple benefit sentence (time saved, longer life, less maintenance, better finish)\n- end with one clear question: “Which option do you want me to quote or lock in?”\n\nReturn 2 versions."]
          }
        ]
      },
      "Getting Paid": {
        "title": "Getting Paid",
        "cards": [{
            "subtitle": "Invoice Reminder (Friendly — 1–3 days overdue)",
            "chatbot": "ChatGPT",
            "front": {

    function fallbackCopy(text, btn) {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.top = "-9999px";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand("copy");
        if (btn) {
          const oldText = btn.innerHTML;
          btn.innerHTML = "Copied ✓";
          btn.style.background = "#1d2958";
          btn.style.color = "#efde21";
          setTimeout(() => {
            btn.innerHTML = oldText;
            btn.style.background = "";
            btn.style.color = "";
          }, 1200);
        }
      } catch (e) {
        if (btn) btn.innerHTML = "Copy failed";
      }
      document.body.removeChild(ta);
    }

      const quickLabels = (card.ui?.quickInputs || []).map((qi) => qi.label.toLowerCase());

      const shouldApply = COMMUNICATION_CATEGORIES.has(current) || looksLikeCommsPrompt;
      if (!shouldApply || text.includes(VOICE_TONE_GUIDE)) return text;
      return text + "\n\nVoice tone:\n" + VOICE_TONE_GUIDE;

              const searchStr = t.toLowerCase();
              const isMultiLine = searchStr.includes("paste") || searchStr.includes("version") || searchStr.includes("message") || searchStr.includes("summary") || searchStr.includes("e.g.") || searchStr.includes("facts");
              const input = document.createElement(isMultiLine ? "textarea" : "input");
              if (!isMultiLine) input.type = "text";
              if (isMultiLine) input.rows = 2;
              input.className = "type-input";
              input.placeholder = t.replace(/\[|\]/g, '');
              input.addEventListener("input", (e) => {
                selections[t] = e.target.value || t;
                updatePromptsText();
              });
              fl.appendChild(input);
            });
            f.appendChild(fl);
            ui.appendChild(f);
          }
          body.appendChild(ui);
        }
        (card.prompts || []).forEach((p, i) => {
          const block = document.createElement("div");
          block.className = "prompt-block";
          const label = document.createElement("div");
          label.className = "prompt-label";
          label.textContent = (card.prompts.length > 1) ? ("Prompt " + (i + 1)) : "Prompt";
          const pre = document.createElement("div");
          pre.className = "prompt-text";
          // Inject global fields on initial load
          let initialText = p;
          initialText = addVoiceToneInstruction(initialText, card);
          const fName = document.getElementById("globalFirstName").value.trim();
          const bName = document.getElementById("globalBizName").value.trim();
          let globalPrefix = "";
          if (fName || bName) {
            globalPrefix = "Context:\nI am an Australian trade business.\n";
            if (fName) globalPrefix += "My Name: " + fName + "\n";
            if (bName) globalPrefix += "My Business: " + bName + "\n";
            globalPrefix += "\n";
          }
          pre.textContent = globalPrefix + initialText;
          // Bottom Row with Copy Button & ChatGPT Link
          const bottomBtnRow = document.createElement("div");
          bottomBtnRow.className = "copy-row";
          const bottomBtn = document.createElement("button");
          bottomBtn.type = "button";
          bottomBtn.className = "copy-btn";
          bottomBtn.innerHTML = "Copy prompt";
          const badge = document.createElement("div");
          badge.className = "chatbot-badge";
          const botName = card.chatbot || "ChatGPT";
          badge.innerHTML = "<a href='https://chatgpt.com/' target='_blank' rel='noopener noreferrer'>Paste into: <strong>" + botName + " &rarr;</strong></a>";
          bottomBtnRow.appendChild(bottomBtn);
          bottomBtnRow.appendChild(badge);
          const doCopy = (btn) => {
            const textToCopy = pre.textContent;
            if (navigator.clipboard && window.isSecureContext) {
              navigator.clipboard.writeText(textToCopy).then(() => {
                const oldText = btn.innerHTML;
                btn.innerHTML = "Copied ✓";
                btn.style.background = "#1d2958";
                btn.style.color = "#efde21";
                setTimeout(() => {
                  btn.innerHTML = oldText;
                  btn.style.background = "";
                  btn.style.color = "";
                }, 1200);
              }).catch(() => fallbackCopy(textToCopy, btn));
            } else {
              fallbackCopy(textToCopy, btn);
            }
          };
          bottomBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            doCopy(bottomBtn);
          });
          block.appendChild(label);
          block.appendChild(pre);
          block.appendChild(bottomBtnRow);
          body.appendChild(block);
        });
        const toggleCard = () => {
          const isOpen = wrap.classList.contains("open");
          document.querySelectorAll(".card.open").forEach((el) => {
            el.classList.remove("open");
          });
          if (!isOpen) {
            wrap.classList.add("open");
            setTimeout(() => {
              const rect = wrap.getBoundingClientRect();
              const y = window.scrollY + rect.top - 16;
              window.scrollTo({
                top: y,
                behavior: "smooth"
              });
            }, 30);
          }
        };
        head.addEventListener("click", (e) => {
          if (e.target.closest(".reveal-btn")) return;
          toggleCard();
        });
        revealBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          toggleCard();
        });
        wrap.appendChild(head);
        wrap.appendChild(body);
        grid.appendChild(wrap);
      });
      buildMenu();
      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    }

    function navigate(key) {
      current = key;
      closeMenu();
      render();
    }
    const menuBtn = document.getElementById("menuBtn");
    const menuPanel = document.getElementById("menuPanel");
    const menuBackdrop = document.getElementById("menuBackdrop");

    function openMenu() {
      menuPanel.classList.add("open");
      menuBackdrop.classList.add("open");
      menuBtn.setAttribute("aria-expanded", "true");
    }

    function closeMenu() {
      menuPanel.classList.remove("open");
      menuBackdrop.classList.remove("open");
      menuBtn.setAttribute("aria-expanded", "false");
    }
    menuBtn.addEventListener("click", () => {
      if (menuPanel.classList.contains("open")) closeMenu();
      else openMenu();
    });
    menuBackdrop.addEventListener("click", closeMenu);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeMenu();
    });
    document.querySelectorAll(".menu-item").forEach((btn) => {
      btn.addEventListener("click", () => navigate(btn.dataset.key));
    });
    // Update prompts automatically if global inputs change
    document.getElementById("globalFirstName").addEventListener("input", render);
    document.getElementById("globalBizName").addEventListener("input", render);
    render();
  </script>
</body>

</html>
