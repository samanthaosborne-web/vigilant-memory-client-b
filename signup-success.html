<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AdvisaStacks - Check Your Inbox</title>
  <link rel="icon" type="image/png" href="./advisastacks-logo-favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f0e7d8;
      --surface: #f0e7d8;
      --accent: #c7612e;
      --text-dark: #292727;
      --text-muted: #292727;
      --text-light: #292727;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Roboto", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-light);
    }

    .card {
      width: min(600px, 100%);
      background: var(--surface);
      color: var(--text-dark);
      border: 4px solid var(--accent);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.28);
      text-align: center;
    }

    .card img {
      width: 180px;
      height: auto;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.1;
    }

    p {
      margin: 0 0 16px;
      font-size: 16px;
      line-height: 1.6;
      color: var(--text-muted);
    }

    a {
      color: var(--accent);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <img src="./advisastacks-logo.png" alt="AdvisaStacks" />
    <h1>Check your inbox to sign in!</h1>
    <p>We've sent a verification link to your email. Click the link to confirm your account, then you're ready to sign in.</p>
    <p>We've also sent you a welcome email with a promo code to get started.</p>
    <p><a href="./login.html">Go to sign in</a></p>
  </main>
</body>
</html>
