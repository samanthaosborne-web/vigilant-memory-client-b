<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AdvisaStacks - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: "Roboto", system-ui, sans-serif;
      background: #313131;
      color: #f9faff;
    }
    .auth-card {
      width: min(520px, 100%);
      background: #f9faff;
      color: #313131;
      border: 4px solid #e75a00;
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.28);
    }
    h1 { margin: 0 0 8px; color: #e75a00; }
    .sub { margin: 0 0 18px; font-size: 14px; color: #555; }
    form { display: grid; gap: 14px; }
    label { display: grid; gap: 7px; font-size: 14px; font-weight: 700; color: #e75a00; }
    input {
      width: 100%;
      border: 2px solid #313131;
      border-radius: 10px;
      padding: 11px 12px;
      font: inherit;
      color: #313131;
      background: #f9faff;
    }
    button {
      justify-self: start;
      background: #e75a00;
      border: 2px solid #e75a00;
      border-radius: 10px;
      color: #f9faff;
      padding: 10px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.24);
    }
    .status { min-height: 20px; font-size: 14px; font-weight: 600; }
    .status.error { color: #b30000; }
    .links { margin-top: 12px; font-size: 14px; }
    a { color: #e75a00; font-weight: 700; }
  </style>
</head>
<body>
  <main class="auth-card">
    <h1>Sign in</h1>
    <p class="sub">Use your AdvisaStacks account credentials.</p>
    <form id="loginForm">
      <label for="email">
        Email
        <input id="email" type="email" autocomplete="email" required />
      </label>
      <label for="password">
        Password
        <input id="password" type="password" autocomplete="current-password" required />
      </label>
      <button type="submit">Log in</button>
      <div id="statusMessage" class="status" aria-live="polite"></div>
    </form>
    <p class="links">No account yet? <a href="./signup.html">Create account</a></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./auth-config.js"></script>
  <script src="./login.js"></script>
</body>
</html>
