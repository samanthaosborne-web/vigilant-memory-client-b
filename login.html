<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AdvisaStacks - Login</title>
  <meta property="og:type" content="website" />
  <meta property="og:title" content="AdvisaStacks | Practical AI Toolkits for Tradie Consultants" />
  <meta property="og:description" content="We're looking for consultants to take part in beta testing for AdvisaStacks, a new AI App for tradie and small business support." />
  <meta property="og:image" content="https://advisastacks.com/AdvisaStacks%20Socials%20Feature.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="AdvisaStacks | Practical AI Toolkits for Tradie Consultants" />
  <meta name="twitter:description" content="We're looking for consultants to take part in beta testing for AdvisaStacks, a new AI App for tradie and small business support." />
  <meta name="twitter:image" content="https://advisastacks.com/AdvisaStacks%20Socials%20Feature.png" />
  <link rel="icon" type="image/png" href="./advisastacks-logo-favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #0A7AFF;
      --accent-hover: #0862CC;
      --radius-sm: 12px;
      --radius-md: 16px;
      --radius-lg: 20px;
    }

    * { 
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Mobile-first: Dark background with image */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000000 url('./AdvisaStacks_Login_BG_Image.png') no-repeat center center;
      background-size: cover;
      color: #FFFFFF;
    }

    /* Desktop: Clean white background */
    @media (min-width: 768px) {
      body {
        background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
        padding: 40px 24px;
        color: #1E293B;
      }
    }

    /* Mobile: Transparent container, blends with background */
    .auth-card {
      width: 100%;
      max-width: 460px;
      background: transparent;
      border-radius: 0;
      padding: 40px 24px;
      box-shadow: none;
      border: none;
    }

    /* Desktop: White card with shadow */
    @media (min-width: 768px) {
      .auth-card {
        background: #FFFFFF;
        border-radius: 24px;
        padding: 40px 36px;
        box-shadow: 
          0 20px 60px rgba(0, 0, 0, 0.08),
          0 8px 16px rgba(0, 0, 0, 0.04);
        border: 1px solid rgba(226, 232, 240, 0.8);
      }
    }

    .form-shell {
      max-width: 100%;
      width: 100%;
    }

    .logo-img {
      width: 180px;
      height: auto;
      margin-bottom: 28px;
      display: block;
      content: url('./AdvisaStacks_White_and_Black_Logo.png');
    }

    /* Desktop: Use blue logo */
    @media (min-width: 768px) {
      .logo-img {
        content: url('./AdvisaStacks_Blue_Logo.png');
      }
    }

    /* Mobile: White text */
    h1 { 
      margin: 0 0 8px; 
      color: #FFFFFF;
      font-family: 'Outfit', sans-serif;
      font-size: clamp(28px, 5vw, 36px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    /* Desktop: Dark text */
    @media (min-width: 768px) {
      h1 {
        color: #1E293B;
      }
    }
    
    /* Mobile: Light text */
    .sub { 
      margin: 0 0 28px; 
      font-size: 15px; 
      color: rgba(255, 255, 255, 0.8);
      font-weight: 500;
      line-height: 1.5;
    }

    /* Desktop: Muted dark text */
    @media (min-width: 768px) {
      .sub {
        color: #64748B;
      }
    }
    
    form { 
      display: grid; 
      gap: 18px; 
    }
    
    /* Mobile: White text for labels */
    label { 
      display: grid; 
      gap: 8px; 
      font-size: 14px; 
      font-weight: 600; 
      color: #FFFFFF; 
      line-height: 1;
    }

    /* Desktop: Dark text for labels */
    @media (min-width: 768px) {
      label {
        color: #1E293B;
      }
    }
    
    /* Mobile: Dark inputs with light border */
    input {
      width: 100%;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 14px;
      padding: 14px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: #FFFFFF;
      background: rgba(255, 255, 255, 0.1);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Desktop: Light inputs */
    @media (min-width: 768px) {
      input {
        border: 2px solid #E2E8F0;
        color: #1E293B;
        background: #F8FAFC;
      }
    }

    /* Mobile: Blue focus state */
    input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(10, 122, 255, 0.15);
      box-shadow: 0 0 0 4px rgba(10, 122, 255, 0.15);
    }

    /* Desktop: Blue focus with white background */
    @media (min-width: 768px) {
      input:focus {
        background: #FFFFFF;
        box-shadow: 0 0 0 4px rgba(10, 122, 255, 0.08);
      }
    }

    /* Mobile: Light placeholder */
    input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    /* Desktop: Muted placeholder */
    @media (min-width: 768px) {
      input::placeholder {
        color: #94A3B8;
      }
    }

    .field-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1;
      margin: 0;
    }

    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -6px;
      margin-bottom: 6px;
    }

    .forgot-link {
      color: var(--accent);
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .forgot-link:hover {
      color: var(--accent-hover);
    }

    button {
      width: 100%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
      border: none;
      border-radius: 14px;
      color: #FFFFFF;
      padding: 16px 24px;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.03em;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(10, 122, 255, 0.3);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(10, 122, 255, 0.4);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    .status { 
      min-height: 20px; 
      font-size: 14px; 
      font-weight: 600;
      margin-top: 8px;
      color: #FFFFFF;
    }

    @media (min-width: 768px) {
      .status {
        color: #1E293B;
      }
    }
    
    .status.error { 
      color: #FCA5A5;
    }

    @media (min-width: 768px) {
      .status.error {
        color: #DC2626;
      }
    }
    
    /* Mobile: White text for links */
    .links { 
      margin-top: 24px; 
      font-size: 14px; 
      color: rgba(255, 255, 255, 0.8);
      text-align: center;
    }

    /* Desktop: Muted dark text for links */
    @media (min-width: 768px) {
      .links {
        color: #64748B;
      }
    }
    
    a { 
      color: var(--accent); 
      font-weight: 600;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    a:hover {
      color: var(--accent-hover);
    }

    /* Mobile: Dark toggle with light inactive state */
    .portal-toggle {
      display: flex;
      gap: 6px;
      margin-bottom: 28px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 6px;
    }

    /* Desktop: Light toggle */
    @media (min-width: 768px) {
      .portal-toggle {
        background: #F1F3F6;
      }
    }
    
    /* Mobile: Light text for inactive */
    .portal-toggle-btn {
      flex: 1;
      padding: 14px 20px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      border: none;
      border-radius: 12px;
      box-shadow: none;
      background: transparent;
      color: rgba(255, 255, 255, 0.6);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Desktop: Muted dark text for inactive */
    @media (min-width: 768px) {
      .portal-toggle-btn {
        color: #64748B;
      }
    }
    
    .portal-toggle-btn.active {
      background: var(--accent);
      color: #FFFFFF;
      box-shadow: 0 2px 8px rgba(10, 122, 255, 0.25);
    }
    
    /* Mobile: Hover state */
    .portal-toggle-btn:not(.active):hover {
      background: rgba(10, 122, 255, 0.15);
      color: #FFFFFF;
    }

    /* Desktop: Different hover state */
    @media (min-width: 768px) {
      .portal-toggle-btn:not(.active):hover {
        background: rgba(10, 122, 255, 0.08);
        color: #1E293B;
      }
    }

    #mfaSection h2 {
      color: var(--text-dark);
      font-family: 'Outfit', sans-serif;
      margin: 0 0 8px;
      font-size: 22px;
      font-weight: 700;
    }

    #mfaSection p {
      font-size: 14px;
      color: var(--text-muted);
      margin: 0 0 20px;
      line-height: 1.6;
    }

    #mfaForm {
      display: grid;
      gap: 18px;
    }

    #mfaCode {
      letter-spacing: 0.3em;
      text-align: center;
      font-family: 'DM Sans', monospace;
      font-weight: 600;
      font-size: 18px;
    }

    #mfaForm > div {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    #resendBtn {
      width: auto;
      background: #F8FAFC;
      color: var(--accent);
      border: 2px solid var(--border-subtle);
      font-size: 14px;
      padding: 14px 20px;
      box-shadow: none;
    }

    #resendBtn:hover {
      background: #F1F3F6;
      border-color: var(--accent);
      transform: none;
      box-shadow: none;
    }

    @keyframes float1 {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(5deg); }
    }

    @keyframes float2 {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(-5deg); }
    }

    @media (max-width: 640px) {
      body {
        padding: 24px 16px;
      }
      
      .auth-card { 
        padding: 32px 24px;
        border-radius: 20px;
      }
      
      h1 { 
        font-size: 28px; 
      }
      
      .sub { 
        font-size: 14px; 
      }
      
      input { 
        font-size: 16px; 
        padding: 14px 16px; 
      }
      
      button { 
        font-size: 16px; 
        padding: 16px 20px; 
      }

      .portal-toggle-btn {
        font-size: 14px;
        padding: 12px 16px;
      }
    }

    /* MFA Section Styles */
    /* Mobile: White text for MFA */
    #mfaSection h2 {
      color: #FFFFFF;
      font-family: 'Outfit', sans-serif;
      margin: 0 0 8px;
      font-size: 22px;
      font-weight: 700;
    }

    #mfaSection p {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
      margin: 0 0 20px;
      line-height: 1.6;
    }

    /* Desktop: Dark text for MFA */
    @media (min-width: 768px) {
      #mfaSection h2 {
        color: #1E293B;
      }

      #mfaSection p {
        color: #64748B;
      }
    }

    #mfaForm {
      display: grid;
      gap: 18px;
    }

    #mfaCode {
      letter-spacing: 0.3em;
      text-align: center;
      font-family: 'DM Sans', monospace;
      font-weight: 600;
      font-size: 18px;
    }

    #mfaForm > div {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* Mobile: Dark resend button */
    #resendBtn {
      width: auto;
      background: rgba(255, 255, 255, 0.1);
      color: var(--accent);
      border: 2px solid rgba(255, 255, 255, 0.2);
      font-size: 14px;
      padding: 14px 20px;
      box-shadow: none;
    }

    #resendBtn:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: var(--accent);
      transform: none;
      box-shadow: none;
    }

    /* Desktop: Light resend button */
    @media (min-width: 768px) {
      #resendBtn {
        background: #F8FAFC;
        border-color: #E2E8F0;
      }

      #resendBtn:hover {
        background: #F1F3F6;
        border-color: var(--accent);
      }
    }
  </style>
</head>
<body>
  <main class="auth-card">
    <div class="form-shell">
      <img src="./AdvisaStacks_White_and_Black_Logo.png" alt="AdvisaStacks" class="logo-img" />
      <div class="portal-toggle">
        <button type="button" class="portal-toggle-btn active" id="clientToggle">Tradie</button>
        <button type="button" class="portal-toggle-btn" id="consultantToggle">Consultant</button>
      </div>
      
      <h1 id="loginHeading">Login</h1>
      <p class="sub" id="loginSub">Welcome Back!</p>
      <input type="hidden" id="portalType" value="client" />
      <form id="loginForm">
        <label for="email">
          <span class="field-title">Email</span>
          <input id="email" type="email" autocomplete="email" required />
        </label>
        <label for="password">
          <span class="field-title">Password</span>
          <input id="password" type="password" autocomplete="current-password" required />
        </label>
        <div class="forgot-row">
          <a class="forgot-link" href="./forgot-password.html">Forgot password?</a>
        </div>
        <button id="loginBtn" type="submit">LOGIN</button>
        <div id="statusMessage" class="status" aria-live="polite"></div>
      </form>

      <div id="mfaSection" style="display:none;">
        <h2>Check your email</h2>
        <p>We've sent a 6-digit verification code to your email address. Enter it below to complete sign-in.</p>
        <form id="mfaForm">
          <label for="mfaCode">
            <span class="field-title">Verification Code</span>
            <input id="mfaCode" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="one-time-code" placeholder="000000" required />
          </label>
          <div>
            <button id="mfaVerifyBtn" type="submit">Verify</button>
            <button id="resendBtn" type="button">Resend code</button>
          </div>
        </form>
      </div>

      <p class="links" id="loginLinks">No account yet? <a href="./signup.html">Create account</a> | <a href="./home.html">Learn more</a></p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./auth-config.js"></script>
  <script src="./login.js"></script>
</body>
</html>
