<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AdvisaStacks - Login</title>
  <meta property="og:type" content="website" />
  <meta property="og:title" content="AdvisaStacks | Practical AI Toolkits for Tradie Consultants" />
  <meta property="og:description" content="We're looking for consultants to take part in beta testing for AdvisaStacks, a new AI App for tradie and small business support." />
  <meta property="og:image" content="https://advisastacks.com/AdvisaStacks%20Socials%20Feature.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="AdvisaStacks | Practical AI Toolkits for Tradie Consultants" />
  <meta name="twitter:description" content="We're looking for consultants to take part in beta testing for AdvisaStacks, a new AI App for tradie and small business support." />
  <meta name="twitter:image" content="https://advisastacks.com/AdvisaStacks%20Socials%20Feature.png" />
  <link rel="icon" type="image/png" href="./advisastacks-logo-favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #313131;
      --surface: #f9faff;
      --accent: #e75a00;
      --text-dark: #313131;
      --text-muted: #555;
      --text-light: #f9faff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Roboto", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-light);
    }

    .auth-card {
      width: min(740px, 100%);
      background: var(--surface);
      color: var(--text-dark);
      border: 4px solid var(--accent);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.28);
    }

    .form-shell {
      max-width: 560px;
      width: 100%;
    }

    h1 { margin: 0 0 8px; color: var(--accent); font-size: clamp(34px, 5vw, 50px); line-height: 1; }
    .sub { margin: 0 0 20px; font-size: 15px; color: var(--text-muted); }
    form { display: grid; gap: 16px; }
    label { display: grid; gap: 7px; font-size: 14px; font-weight: 700; color: var(--accent); line-height: 1; }
    input {
      width: 100%;
      border: 3px solid var(--text-dark);
      border-radius: 16px;
      padding: 12px 14px;
      font: inherit;
      font-size: 20px;
      color: var(--text-dark);
      background: var(--surface);
    }

    .field-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-top: 2px;
    }

    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -6px;
    }

    .forgot-link {
      color: var(--accent);
      font-weight: 700;
      font-size: 16px;
    }

    button {
      justify-self: start;
      background: var(--accent);
      border: 2px solid var(--accent);
      border-radius: 14px;
      color: var(--text-light);
      padding: 12px 26px;
      font: inherit;
      font-weight: 700;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.24);
    }

    button:disabled {
      opacity: 0.7;
      cursor: default;
    }

    .status { min-height: 20px; font-size: 14px; font-weight: 600; }
    .status.error { color: #b30000; }
    .links { margin-top: 14px; font-size: 16px; color: var(--text-dark); }
    a { color: var(--accent); font-weight: 700; }

    @media (max-width: 640px) {
      .auth-card { padding: 18px; }
      h1 { font-size: 34px; }
      .sub { font-size: 14px; }
      .field-title { font-size: 14px; }
      input { font-size: 16px; padding: 10px 12px; border-width: 2px; }
      button { font-size: 18px; padding: 10px 18px; }
    }
  </style>
</head>
<body>
  <main class="auth-card">
    <div class="form-shell">
      <h1>Sign in</h1>
      <p class="sub">Use your AdvisaStacks account credentials.</p>
      <form id="loginForm">
        <label for="email">
          <span class="field-title">Email</span>
          <input id="email" type="email" autocomplete="email" required />
        </label>
        <label for="password">
          <span class="field-title">Password</span>
          <input id="password" type="password" autocomplete="current-password" required />
        </label>
        <div class="forgot-row">
          <a class="forgot-link" href="./forgot-password.html">Forgot password?</a>
        </div>
        <button id="loginBtn" type="submit">Log in</button>
        <div id="statusMessage" class="status" aria-live="polite"></div>
      </form>

      <div id="mfaSection" style="display:none;">
        <h2 style="color:var(--accent); margin:0 0 8px;">Check your email</h2>
        <p style="font-size:14px; color:var(--text-muted); margin:0 0 16px;">We've sent a 6-digit verification code to your email address. Enter it below to complete sign-in.</p>
        <form id="mfaForm" style="display:grid; gap:16px;">
          <label for="mfaCode">
            <span class="field-title">Verification Code</span>
            <input id="mfaCode" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="one-time-code" placeholder="000000" required style="letter-spacing:0.3em; text-align:center;" />
          </label>
          <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
            <button id="mfaVerifyBtn" type="submit">Verify</button>
            <button id="resendBtn" type="button" style="background:#fff; color:var(--accent); font-size:16px; padding:10px 18px;">Resend code</button>
          </div>
        </form>
      </div>

      <p class="links">No account yet? <a href="./signup.html">Create account</a> | <a href="./home.html">Learn more</a></p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./auth-config.js"></script>
  <script src="./login.js"></script>
</body>
</html>
