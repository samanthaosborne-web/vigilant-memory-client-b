<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AdvisaStacks - Login</title>
  <meta property="og:type" content="website" />
  <meta property="og:title" content="AdvisaStacks | Practical AI Toolkits for Tradie Consultants" />
  <meta property="og:description" content="We're looking for consultants to take part in beta testing for AdvisaStacks, a new AI App for tradie and small business support." />
  <meta property="og:image" content="https://advisastacks.com/AdvisaStacks%20Socials%20Feature.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="AdvisaStacks | Practical AI Toolkits for Tradie Consultants" />
  <meta name="twitter:description" content="We're looking for consultants to take part in beta testing for AdvisaStacks, a new AI App for tradie and small business support." />
  <meta name="twitter:image" content="https://advisastacks.com/AdvisaStacks%20Socials%20Feature.png" />
  <link rel="icon" type="image/png" href="./advisastacks-logo-favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
      --surface: #FFFFFF;
      --card-bg: #FFFFFF;
      --accent: #0A7AFF;
      --accent-hover: #0862CC;
      --text-dark: #1E293B;
      --text-muted: #64748B;
      --text-light: #94A3B8;
      --border-subtle: #E2E8F0;
      --border-input: #E2E8F0;
      --bg-input: #F8FAFC;
      --radius-sm: 12px;
      --radius-md: 16px;
      --radius-lg: 20px;
      --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.06), 0 4px 8px rgba(0, 0, 0, 0.04);
      --shadow-focus: 0 0 0 4px rgba(10, 122, 255, 0.08);
    }

    * { 
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px 24px;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
      color: var(--text-dark);
    }

    .auth-card {
      width: min(460px, 100%);
      background: var(--surface);
      border-radius: 24px;
      padding: 40px 36px;
      box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.08),
        0 8px 16px rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(226, 232, 240, 0.8);
    }

    .form-shell {
      max-width: 100%;
      width: 100%;
    }

    .form-shell > img {
      width: 180px !important;
      height: auto !important;
      margin-bottom: 28px !important;
      display: block;
    }

    h1 { 
      margin: 0 0 8px; 
      color: var(--text-dark); 
      font-family: 'Outfit', sans-serif;
      font-size: clamp(28px, 5vw, 36px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    
    .sub { 
      margin: 0 0 28px; 
      font-size: 15px; 
      color: var(--text-muted);
      font-weight: 500;
      line-height: 1.5;
    }
    
    form { 
      display: grid; 
      gap: 18px; 
    }
    
    label { 
      display: grid; 
      gap: 8px; 
      font-size: 14px; 
      font-weight: 600; 
      color: var(--text-dark); 
      line-height: 1;
    }
    
    input {
      width: 100%;
      border: 2px solid var(--border-input);
      border-radius: 14px;
      padding: 14px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text-dark);
      background: var(--bg-input);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      background: #FFFFFF;
      box-shadow: var(--shadow-focus);
    }

    input::placeholder {
      color: var(--text-light);
    }

    .field-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dark);
      line-height: 1;
      margin: 0;
    }

    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -6px;
      margin-bottom: 6px;
    }

    .forgot-link {
      color: var(--accent);
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .forgot-link:hover {
      color: var(--accent-hover);
    }

    button {
      width: 100%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
      border: none;
      border-radius: 14px;
      color: #FFFFFF;
      padding: 16px 24px;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.03em;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(10, 122, 255, 0.3);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(10, 122, 255, 0.4);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    .status { 
      min-height: 20px; 
      font-size: 14px; 
      font-weight: 600;
      margin-top: 8px;
    }
    
    .status.error { 
      color: #DC2626; 
    }
    
    .links { 
      margin-top: 24px; 
      font-size: 14px; 
      color: var(--text-muted);
      text-align: center;
    }
    
    a { 
      color: var(--accent); 
      font-weight: 600;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    a:hover {
      color: var(--accent-hover);
    }

    .portal-toggle {
      display: flex;
      gap: 6px;
      margin-bottom: 28px;
      background: #F1F3F6;
      border-radius: 16px;
      padding: 6px;
    }
    
    .portal-toggle-btn {
      flex: 1;
      padding: 14px 20px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      border: none;
      border-radius: 12px;
      box-shadow: none;
      background: transparent;
      color: var(--text-muted);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .portal-toggle-btn.active {
      background: var(--accent);
      color: #FFFFFF;
      box-shadow: 0 2px 8px rgba(10, 122, 255, 0.25);
    }
    
    .portal-toggle-btn:not(.active):hover {
      background: rgba(10, 122, 255, 0.08);
      color: var(--text-dark);
    }

    #mfaSection h2 {
      color: var(--text-dark);
      font-family: 'Outfit', sans-serif;
      margin: 0 0 8px;
      font-size: 22px;
      font-weight: 700;
    }

    #mfaSection p {
      font-size: 14px;
      color: var(--text-muted);
      margin: 0 0 20px;
      line-height: 1.6;
    }

    #mfaForm {
      display: grid;
      gap: 18px;
    }

    #mfaCode {
      letter-spacing: 0.3em;
      text-align: center;
      font-family: 'DM Sans', monospace;
      font-weight: 600;
      font-size: 18px;
    }

    #mfaForm > div {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    #resendBtn {
      width: auto;
      background: #F8FAFC;
      color: var(--accent);
      border: 2px solid var(--border-subtle);
      font-size: 14px;
      padding: 14px 20px;
      box-shadow: none;
    }

    #resendBtn:hover {
      background: #F1F3F6;
      border-color: var(--accent);
      transform: none;
      box-shadow: none;
    }

    @keyframes float1 {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(5deg); }
    }

    @keyframes float2 {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(-5deg); }
    }

    @media (max-width: 640px) {
      body {
        padding: 24px 16px;
      }
      
      .auth-card { 
        padding: 32px 24px;
        border-radius: 20px;
      }
      
      h1 { 
        font-size: 28px; 
      }
      
      .sub { 
        font-size: 14px; 
      }
      
      input { 
        font-size: 16px; 
        padding: 14px 16px; 
      }
      
      button { 
        font-size: 16px; 
        padding: 16px 20px; 
      }

      .portal-toggle-btn {
        font-size: 14px;
        padding: 12px 16px;
      }
    }
  </style>
</head>
<body>
  <main class="auth-card">
    <div class="form-shell">
      <img src="./AdvisaStacks_Blue_Logo.png" alt="AdvisaStacks" style="width:180px; height:auto; margin-bottom:16px;" />
      <div class="portal-toggle">
        <button type="button" class="portal-toggle-btn active" id="clientToggle">Tradie</button>
        <button type="button" class="portal-toggle-btn" id="consultantToggle">Consultant</button>
      </div>
      
      <!-- Hero Illustration -->
      <div style="margin: 30px 0; height: 200px; display: flex; align-items: center; justify-content: center; position: relative;">
        <div style="position: relative; width: 200px; height: 200px;">
          <img 
            src="./AdvisaStacks_Gear_Image.png"
            alt="Tools"
            style="position: absolute; width: 100px; height: 100px; object-fit: contain; filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.1)); top: 20px; left: 10px; animation: float1 3s ease-in-out infinite;"
          />
          <img 
            src="./AdvisaStacks_Hammer_Image.png"
            alt="Tools"
            style="position: absolute; width: 100px; height: 100px; object-fit: contain; filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.1)); bottom: 20px; right: 10px; animation: float2 3s ease-in-out infinite;"
          />
        </div>
      </div>
      
      <h1 id="loginHeading">Login</h1>
      <p class="sub" id="loginSub">Welcome Back!</p>
      <input type="hidden" id="portalType" value="client" />
      <form id="loginForm">
        <label for="email">
          <span class="field-title">Email</span>
          <input id="email" type="email" autocomplete="email" required />
        </label>
        <label for="password">
          <span class="field-title">Password</span>
          <input id="password" type="password" autocomplete="current-password" required />
        </label>
        <div class="forgot-row">
          <a class="forgot-link" href="./forgot-password.html">Forgot password?</a>
        </div>
        <button id="loginBtn" type="submit">Log in</button>
        <div id="statusMessage" class="status" aria-live="polite"></div>
      </form>

      <div id="mfaSection" style="display:none;">
        <h2 style="color:var(--text-dark); margin:0 0 6px; font-size:20px;">Check your email</h2>
        <p style="font-size:13px; color:var(--text-muted); margin:0 0 14px;">We've sent a 6-digit verification code to your email address. Enter it below to complete sign-in.</p>
        <form id="mfaForm" style="display:grid; gap:14px;">
          <label for="mfaCode">
            <span class="field-title">Verification Code</span>
            <input id="mfaCode" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="one-time-code" placeholder="000000" required style="letter-spacing:0.3em; text-align:center;" />
          </label>
          <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
            <button id="mfaVerifyBtn" type="submit">Verify</button>
            <button id="resendBtn" type="button" style="background:var(--surface); color:var(--accent); border-color:var(--border-subtle); font-size:14px; padding:10px 16px;">Resend code</button>
          </div>
        </form>
      </div>

      <p class="links" id="loginLinks">No account yet? <a href="./signup.html">Create account</a> | <a href="./home.html">Learn more</a></p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./auth-config.js"></script>
  <script src="./login.js"></script>
</body>
</html>
