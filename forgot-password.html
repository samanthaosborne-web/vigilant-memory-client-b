<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AdvisaStacks - Forgot Password</title>
  <link rel="icon" type="image/png" href="./advisastacks-logo-favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #c3b6a6;
      --surface: #c3b6a6;
      --accent: #c7612e;
      --accent-hover: #b35425;
      --text-dark: #292727;
      --text-muted: #292727;
      --border-subtle: #a89b8b;
      --radius-sm: 6px;
      --radius-md: 10px;
      --shadow-md: 0 4px 12px rgba(45, 42, 38, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Roboto", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-dark);
    }

    .auth-card {
      width: min(480px, 100%);
      background: var(--surface);
      color: var(--text-dark);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 28px;
      box-shadow: var(--shadow-md);
    }

    h1 { margin: 0 0 6px; color: var(--text-dark); font-size: clamp(22px, 4vw, 28px); line-height: 1.1; }
    .sub { margin: 0 0 18px; font-size: 13px; color: var(--text-muted); }
    form { display: grid; gap: 12px; }
    label { display: grid; gap: 6px; font-size: 13px; font-weight: 700; color: var(--text-muted); }
    input {
      width: 100%;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font: inherit;
      font-size: 16px;
      color: var(--text-dark);
      background: var(--surface);
    }
    input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
    button {
      justify-self: start;
      background: var(--accent);
      border: 1px solid var(--accent);
      border-radius: var(--radius-sm);
      color: #241f72;
      padding: 10px 18px;
      font: inherit;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(45, 42, 38, 0.06);
      transition: background 0.15s;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.7; cursor: default; }
    .status { min-height: 18px; font-size: 13px; font-weight: 600; }
    .status.error { color: #b30000; }
    .status.ok { color: #0f6e29; }
    .links { margin-top: 14px; font-size: 13px; color: var(--text-muted); }
    a { color: var(--accent); font-weight: 600; }
  </style>
</head>
<body>
  <main class="auth-card">
    <h1>Reset password</h1>
    <p class="sub">Enter your account email and we’ll send a secure reset link.</p>
    <form id="forgotPasswordForm">
      <label for="email">
        Email
        <input id="email" type="email" autocomplete="email" required />
      </label>
      <button id="sendResetBtn" type="submit">Send reset link</button>
      <div id="statusMessage" class="status" aria-live="polite"></div>
    </form>
    <p class="links"><a href="./login.html">Back to login</a></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./auth-config.js"></script>
  <script src="./forgot-password.js"></script>
</body>
</html>
