<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AdvisaStacks - Forgot Password</title>
  <link rel="icon" type="image/png" href="./advisastacks-logo-favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f9faff;
      --surface: #313131;
      --accent: #e75a00;
      --text-dark: #f9faff;
      --text-muted: #555;
      --text-light: #313131;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Roboto", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-light);
    }

    .auth-card {
      width: min(620px, 100%);
      background: var(--surface);
      color: var(--text-dark);
      border: 4px solid var(--accent);
      border-radius: 16px;
      padding: 26px;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.28);
    }

    h1 { margin: 0 0 8px; color: var(--accent); font-size: clamp(30px, 5vw, 44px); line-height: 1.05; }
    .sub { margin: 0 0 20px; font-size: 15px; color: var(--text-muted); }
    form { display: grid; gap: 14px; }
    label { display: grid; gap: 7px; font-size: 14px; font-weight: 700; color: var(--accent); }
    input {
      width: 100%;
      border: 3px solid var(--text-dark);
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      font-size: 18px;
      color: var(--text-dark);
      background: var(--surface);
    }
    button {
      justify-self: start;
      background: var(--accent);
      border: 2px solid var(--accent);
      border-radius: 12px;
      color: var(--text-light);
      padding: 10px 18px;
      font: inherit;
      font-weight: 700;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.24);
    }
    button:disabled { opacity: 0.7; cursor: default; }
    .status { min-height: 20px; font-size: 14px; font-weight: 600; }
    .status.error { color: #b30000; }
    .status.ok { color: #0f6e29; }
    .links { margin-top: 14px; font-size: 15px; }
    a { color: var(--accent); font-weight: 700; }
  </style>
</head>
<body>
  <main class="auth-card">
    <h1>Reset password</h1>
    <p class="sub">Enter your account email and we’ll send a secure reset link.</p>
    <form id="forgotPasswordForm">
      <label for="email">
        Email
        <input id="email" type="email" autocomplete="email" required />
      </label>
      <button id="sendResetBtn" type="submit">Send reset link</button>
      <div id="statusMessage" class="status" aria-live="polite"></div>
    </form>
    <p class="links"><a href="./login.html">Back to login</a></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./auth-config.js"></script>
  <script src="./forgot-password.js"></script>
</body>
</html>
